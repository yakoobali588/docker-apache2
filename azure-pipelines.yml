# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- master

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '62c9c938-bd41-44f1-9ee5-05a279ae18ea'
  imageRepository: 'yakoobalidockerapache'
  containerRegistry: 'demoacruat.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  imageName: 'apache-webapp'
  acrName: 'demoacruat'              # ACR name (without azurecr.io)
  acrLoginServer: 'demoacruat.azurecr.io'
  aksCluster: 'aksdemocluster'
  aksResourceGroup: 'demo-rg'
  namespace: 'default'


  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

# =========================
# Stage 1: Build & Push Image
# =========================
